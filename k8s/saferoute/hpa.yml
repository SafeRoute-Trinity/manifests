---
# notification-service: minReplicas: 1 because OUTBOX_WORKER_ENABLED=true runs a background
# worker that polls the DB for unsent messages. With 2 replicas, both workers run concurrently;
# your outbox implementation must use advisory locks or skip-locked queries to avoid double-sends.
# Keep min at 1 until the outbox worker is safe for concurrent execution, then raise to 2.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: notification-service-hpa
  namespace: saferoute
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: notification-service
  minReplicas: 1
  maxReplicas: 2
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
---
