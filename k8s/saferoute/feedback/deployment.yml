apiVersion: apps/v1
kind: Deployment
metadata:
  name: feedback
  namespace: saferoute
  labels:
    app: feedback
    tier: backend
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: feedback
  template:
    metadata:
      labels:
        app: feedback
        tier: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "80"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: feedback
        image: saferoute/feedback:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
          name: http
        env:
        - name: POSTGRES_HOST
          value: postgresql.data.svc.cluster.local
        - name: POSTGRES_PORT
          value: "5432"
        - name: POSTGRES_DATABASE
          valueFrom:
            configMapKeyRef:
              name: feedback-config
              key: database.name
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: postgresql-secret
              key: username
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgresql-secret
              key: password
        - name: DATABASE_SSLMODE
          value: "disable"
        - name: REDIS_HOST
          value: redis.data.svc.cluster.local
        - name: REDIS_PORT
          value: "6379"
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: redis-secret
              key: password
        - name: RECAPTCHA_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: feedback-recaptcha-secret
              key: RECAPTCHA_SECRET_KEY
        - name: SMTP_HOST
          valueFrom:
            secretKeyRef:
              name: feedback-smtp-secret
              key: SMTP_HOST
        - name: SMTP_PORT
          valueFrom:
            secretKeyRef:
              name: feedback-smtp-secret
              key: SMTP_PORT
        - name: SMTP_USERNAME
          valueFrom:
            secretKeyRef:
              name: feedback-smtp-secret
              key: SMTP_USERNAME
        - name: SMTP_PASSWORD
          valueFrom:
            secretKeyRef:
              name: feedback-smtp-secret
              key: SMTP_PASSWORD
        - name: SYSTEM_FEEDBACK_TO_EMAIL
          valueFrom:
            secretKeyRef:
              name: feedback-smtp-secret
              key: SYSTEM_FEEDBACK_TO_EMAIL
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 5

